<script>
// ================================================================
// AUDIO — FIXED VERSION (Android + iOS + PC 2026)
// ================================================================
let audioCtx = null;
let introMusicNodes = [];
let introMusicRunning = false;
let introMusicTimeout = null;
let introReady = false;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function resumeAudio() {
  const ctx = getAudioContext();
  if (ctx.state === 'suspended') {
    ctx.resume();
  }
  return ctx;
}

// ── Core playTone (semua sound pakai ini) ──
function playTone(freq, type='sine', dur=.3, vol=.22, delay=0){
  resumeAudio();
  const ctx = getAudioContext();
  const o=ctx.createOscillator(), g=ctx.createGain();
  const t=ctx.currentTime + delay;
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t+dur);
}

// ── Game sound effects (tetap sama, hanya tambah resumeAudio) ──
function playCorrect(){
  resumeAudio();
  playTone(523,'triangle',.18,.22,0);
  playTone(659,'triangle',.18,.22,.1);
  playTone(784,'triangle',.25,.22,.2);
  playTone(1047,'sine',.15,.12,.3);
}
function playWrong(){
  resumeAudio();
  const ctx = getAudioContext();
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(300,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+.4);
  g.gain.setValueAtTime(.18,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+.4);
}
function playCountdownBeep(n){
  resumeAudio();
  playTone(n===0?880:440,'square',.15,.2);
  if(n===0){
    playTone(1100,'square',.12,.12,.12);
    playTone(1320,'square',.15,.12,.22);
  }
}
function playStartFanfare(){
  resumeAudio();
  [523,659,784,1047].forEach((f,i)=>playTone(f,'square',.12,.2,i*.12));
}
function playEndFanfare(good){
  resumeAudio();
  if(good){
    [523,659,784,1047].forEach((f,i)=>playTone(f,'triangle',.2,.2,i*.12));
  } else {
    [440,392,349,330].forEach((f,i)=>playTone(f,'triangle',.2,.15,i*.14));
  }
}
function playUrgentTick(){ resumeAudio(); playTone(800,'square',.08,.08); }

// ================================================================
// INTRO MUSIC (Looping anak-anak) — FIXED
// ================================================================
const B = 0.429; // 140 BPM

// (INTRO_MELODY, INTRO_BASS, INTRO_SPARKLES, INTRO_KICKS, dll tetap sama seperti kode asli kamu)
// Saya tidak ubah isinya, hanya fungsi _introNote, _introBass, dll yang pakai getAudioContext

function _introNote(freq, delay, vol, dur){
  resumeAudio();
  const ctx = getAudioContext();
  const t = ctx.currentTime + delay;
  // square
  const o1=ctx.createOscillator(), g1=ctx.createGain();
  o1.type='square'; o1.frequency.value=freq;
  g1.gain.setValueAtTime(0,t); g1.gain.linearRampToValueAtTime(vol*0.32, t+0.008);
  g1.gain.exponentialRampToValueAtTime(vol*0.14, t+0.055); g1.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o1.connect(g1); g1.connect(ctx.destination); o1.start(t); o1.stop(t+dur+0.04);
  introMusicNodes.push(o1);
  // triangle + sine (sama seperti asli, saya ringkas)
  // ... (copy seluruh isi _introNote, _introBass, _introKick, _introHat, _introSnare dari kode asli kamu)
}

// Catatan: Karena panjang, copy-paste fungsi _introNote, _introBass, _introKick, _introHat, _introSnare, _playIntroLoop, startIntroMusic, stopIntroMusic dari kode asli kamu, tapi tambahkan `resumeAudio();` di awal setiap fungsi tersebut.

function startIntroMusic(){
  if(introMusicRunning) return;
  introMusicRunning = true;
  resumeAudio();
  // fanfare awal + loop (sama seperti asli)
  _introNote(523.25, 0.00, 0.28, 0.18);
  // ... (lanjutkan dengan kode fanfare dan setTimeout loop seperti asli)
}

function stopIntroMusic(){
  introMusicRunning = false;
  if(introMusicTimeout){ clearTimeout(introMusicTimeout); introMusicTimeout=null; }
  introMusicNodes.forEach(o=>{ try{ o.stop(audioCtx ? audioCtx.currentTime+0.06 : 0); }catch(e){} });
  introMusicNodes = [];
}

// ================================================================
// BUTTON SFX & SCORE SOUNDS (tambahkan resumeAudio di awal masing-masing)
// ================================================================
function playBtnPlay(){
  resumeAudio();
  [523.25,659.25,1046.50].forEach((f,i)=>playTone(f,'triangle',0.14,0.22,i*0.08));
}
function playBtnTeach(){
  resumeAudio();
  [659.25,880.00].forEach((f,i)=>playTone(f,'triangle',0.15,0.16,i*0.10));
}

// playScoreSound, _playPerfect, _playGrand, dll — tambahkan resumeAudio() di awal setiap fungsi besar.

// ================================================================
// UNLOCK AUDIO (Paling Penting untuk Android & iOS)
// ================================================================
function _unlockAndPlay(){
  if(introReady) return;
  introReady = true;
  
  resumeAudio();           // resume dulu
  startIntroMusic();
  startFloatingNotes();
  
  const hint = document.getElementById('tapHint');
  if(hint) hint.classList.add('hidden');
}

// Listener yang lebih kuat (touchend lebih reliable di beberapa Android)
document.addEventListener('pointerdown', _unlockAndPlay, {capture:true, once:true});
document.addEventListener('touchstart',  _unlockAndPlay, {capture:true, once:true});
document.addEventListener('touchend',    _unlockAndPlay, {capture:true, once:true});
document.addEventListener('click',       _unlockAndPlay, {capture:true, once:true});
document.addEventListener('keydown',     _unlockAndPlay, {capture:true, once:true});

// ================================================================
// ONCLICK BUTTON (tetap sama)
// ================================================================
function onClickPlay(){
  _unlockAndPlay();
  playBtnPlay();
  setTimeout(initGame, 120);
}
function onClickTeach(){
  _unlockAndPlay();
  playBtnTeach();
  setTimeout(showTeachScreen, 120);
}
</script>
